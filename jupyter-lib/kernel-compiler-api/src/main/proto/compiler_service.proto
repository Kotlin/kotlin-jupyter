syntax = "proto3";

package org.jetbrains.kotlinx.jupyter.compiler.proto;

option java_multiple_files = true;
option java_package = "org.jetbrains.kotlinx.jupyter.compiler.proto";

// Main compiler service (daemon implements this)
service JupyterCompilerService {
    rpc Initialize(InitializeRequest) returns (InitializeResponse);
    rpc Compile(CompileRequest) returns (CompileResponse);
    rpc AddClasspathEntries(AddClasspathEntriesRequest) returns (AddClasspathEntriesResponse);
}

// Kernel callback service (kernel implements this)
service KernelCallbackService {
    rpc ReportImports(ReportImportsRequest) returns (ReportImportsResponse);
    rpc ReportDeclarations(ReportDeclarationsRequest) returns (ReportDeclarationsResponse);
    rpc ResolveDependencies(ResolveDependenciesRequest) returns (ResolveDependenciesResponse);
}

enum ReplCompilerMode {
    K1 = 0;
    K2 = 1;
}

message InitializeRequest {
    repeated string classpath_entries = 1;
    string jvm_target = 2;
    repeated string script_receiver_canonical_names = 3;
    ReplCompilerMode repl_compiler_mode = 4;
}

message InitializeResponse {
    bool success = 1;
}

message CompileRequest {
    int32 snippet_id = 1;
    string code = 2;
    int32 cell_id = 3;
}

message CompiledClass {
    string class_name = 1;
    bytes class_bytes = 2;
}

enum DiagnosticSeverity {
    ERROR = 0;
    WARNING = 1;
    INFO = 2;
}

message SourceLocation {
    int32 line = 1;
    int32 column = 2;
}

message Diagnostic {
    DiagnosticSeverity severity = 1;
    string message = 2;
    SourceLocation location = 3;
}

message CompileResponse {
    bool success = 1;
    // On success: Java-serialized LinkedSnippet<KJvmCompiledScript>
    bytes serialized_compiled_snippet = 2;
    // On failure:
    repeated Diagnostic diagnostics = 3;
}

message AddClasspathEntriesRequest {
    repeated string classpath_entries = 1;
}

message AddClasspathEntriesResponse {
    bool success = 1;
}


message ReportImportsRequest {
    repeated string imports = 1;
}

message ReportImportsResponse {}

enum DeclarationType {
    FUNCTION = 0;
    CLASS = 1;
    PROPERTY = 2;
    OBJECT = 3;
    UNKNOWN = 4;
}

message DeclarationInfo {
    string name = 1;
    DeclarationType type = 2;
}

message ReportDeclarationsRequest {
    repeated DeclarationInfo declarations = 1;
}

message ReportDeclarationsResponse {}

enum AnnotationType {
    DEPENDS_ON = 0;
    REPOSITORY = 1;
}

message DependencyAnnotation {
    AnnotationType type = 1;
    string value = 2;
}

message ResolveDependenciesRequest {
    repeated DependencyAnnotation annotations = 1;
}

message ResolveDependenciesResponse {
    bool success = 1;
    repeated string classpath_entries = 2;
    string error_message = 3;
}
