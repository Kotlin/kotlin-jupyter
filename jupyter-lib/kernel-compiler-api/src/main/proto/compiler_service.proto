syntax = "proto3";

package org.jetbrains.kotlinx.jupyter.compiler.proto;

option java_multiple_files = true;
option java_package = "org.jetbrains.kotlinx.jupyter.compiler.proto";

// Main compiler service (daemon implements this)
service JupyterCompilerService {
    rpc Initialize(InitializeRequest) returns (InitializeResponse);
    rpc Compile(CompileRequest) returns (CompileResponse);
    rpc AddClasspathEntries(AddClasspathEntriesRequest) returns (AddClasspathEntriesResponse);
    rpc Complete(CompleteRequest) returns (CompleteResponse);
    rpc ListErrors(ListErrorsRequest) returns (ListErrorsResponse);
    rpc CheckComplete(CheckCompleteRequest) returns (CheckCompleteResponse);
    rpc GetClasspath(GetClasspathRequest) returns (GetClasspathResponse);
}

// Kernel callback service (kernel implements this)
service KernelCallbackService {
    rpc ReportImports(ReportImportsRequest) returns (ReportImportsResponse);
    rpc ReportDeclarations(ReportDeclarationsRequest) returns (ReportDeclarationsResponse);
    rpc ResolveDependencies(ResolveDependenciesRequest) returns (ResolveDependenciesResponse);
    rpc UpdatedClasspath(UpdatedClasspathRequest) returns (UpdatedClasspathResponse);
}

enum ReplCompilerMode {
    K1 = 0;
    K2 = 1;
}

message InitializeRequest {
    repeated string classpath_entries = 1;
    string jvm_target = 2;
    repeated string script_receiver_canonical_names = 3;
    ReplCompilerMode repl_compiler_mode = 4;
}

message InitializeResponse {
    bool success = 1;
    optional string error_message = 2;
}

message CompileRequest {
    int32 snippet_id = 1;
    string code = 2;
    int32 cell_id = 3;
}

message CompiledClass {
    string class_name = 1;
    bytes class_bytes = 2;
}

enum DiagnosticSeverity {
    FATAL = 0;
    ERROR = 1;
    WARNING = 2;
    INFO = 3;
    DEBUG = 4;
}

message SourcePosition {
    int32 line = 1;
    int32 col = 2;
}

message SourceLocation {
    SourcePosition start = 1;
    optional SourcePosition end = 2;
}

message Diagnostic {
    int32 code = 1;
    string message = 2;
    DiagnosticSeverity severity = 3;
    optional string source_path = 4;
    optional SourceLocation location = 5;
}

message CompileResponse {
    bool success = 1;
    // On success: Java-serialized LinkedSnippet<KJvmCompiledScript>
    bytes serialized_compiled_snippet = 2;
    // Hash codes for each KJvmCompiledScript in the list (in same order)
    repeated int32 script_hash_codes = 4;
    // On failure:
    repeated Diagnostic diagnostics = 3;
}

message AddClasspathEntriesRequest {
    repeated string classpath_entries = 1;
}

message AddClasspathEntriesResponse {
    bool success = 1;
    optional string error_message = 2;
}

message SourceCodePosition {
    int32 line = 1;
    int32 col = 2;
    int32 absolute_pos = 3;
}

message CompleteRequest {
    string code = 1;
    int32 id = 2;
    SourceCodePosition position = 3;
}

message SourceCodeCompletionVariant {
    string text = 1;
    string display_text = 2;
    string tail = 3;
    string icon = 4;
    optional string deprecation_level = 5;
}

message CompleteResponse {
    bool success = 1;
    repeated SourceCodeCompletionVariant completions = 2;
    optional string error_message = 3;
}

message ListErrorsRequest {
    string code = 1;
    int32 id = 2;
}

message ListErrorsResponse {
    bool success = 1;
    repeated Diagnostic diagnostics = 2;
    optional string error_message = 3;
}

message CheckCompleteRequest {
    string code = 1;
}

message CheckCompleteResponse {
    bool success = 1;
    bool is_complete = 2;
    optional string error_message = 3;
}

message GetClasspathRequest {
}

message GetClasspathResponse {
    bool success = 1;
    repeated string classpath_entries = 2;
    optional string error_message = 3;
}

message ReportImportsRequest {
    repeated string imports = 1;
}

message ReportImportsResponse {}

enum DeclarationType {
    FUNCTION = 0;
    CLASS = 1;
    PROPERTY = 2;
    OBJECT = 3;
    UNKNOWN = 4;
    SCRIPT_INITIALIZER = 5;
}

message DeclarationInfo {
    string name = 1;
    DeclarationType type = 2;
}

message ReportDeclarationsRequest {
    repeated DeclarationInfo declarations = 1;
}

message ReportDeclarationsResponse {}

enum AnnotationType {
    DEPENDS_ON = 0;
    REPOSITORY = 1;
}

message DependencyAnnotation {
    AnnotationType type = 1;
    string value = 2;
}

message ResolveDependenciesRequest {
    repeated DependencyAnnotation annotations = 1;
}

message ResolveDependenciesResponse {
    bool success = 1;
    repeated string classpath_entries = 2;
    optional string error_message = 3;
}

message UpdatedClasspathRequest {}

message UpdatedClasspathResponse {
    bool success = 1;
    repeated string classpath_entries = 2;
    optional string error_message = 3;
}
